spring:
  application:
    name: mobidic
  profiles:
    active: dev
  config:
    import:
      - optional:classpath:application-storage.yml
      - optional:classpath:application-external.yml
  servlet:
    multipart:
      max-file-size: 11MB
      max-request-size: 12MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  exp: ${JWT_ACCESS_EXP}

springdoc:
  api-docs:
    path: /api/api-spec
    enabled: true
  swagger-ui:
    path: /api/my-docs
    enabled: true
  override-with-generic-response: false
  use-fqn: true

oauth2:
  callback-url:
    frontend:
      kakao:
        frontend-callback-url: ${KAKAO_FRONTEND_CALLBACK_URL}
        android-callback-url: ${KAKAO_ANDROID_CALLBACK_URL}
        dev:
          frontend-callback-url: ${KAKAO_DEV_FRONTEND_CALLBACK_URL}