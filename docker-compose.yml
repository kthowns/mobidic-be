version: "3.8"

services:
  mobidic-db:
    image: mysql:8.0
    container_name: mobidic-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mobidic-net

  mobidic-be:
    image: ${DOCKERHUB_USERNAME}/${IMAGE_NAME}:latest
    container_name: mobidic-be
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mobidic-db:
        condition: service_healthy
    networks:
      - mobidic-net

  mobidic-redis:
    image: redis:7-alpine
    container_name: mobidic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mobidic-net

  mobidic-nginx:
    image: nginx:latest
    container_name: mobidic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    depends_on:
      - mobidic-be
    networks:
      - mobidic-net

  mobidic-certbot:
    image: certbot/certbot
    container_name: mobidic-certbot
    restart: unless-stopped
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    networks:
      - mobidic-net

networks:
  mobidic-net:
    external: true

volumes:
  certbot-etc:
  certbot-var:
  db-data:
  redis-data: