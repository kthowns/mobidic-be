spring:
  application:
    name: mobidic
#  profiles:
#    active: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        highlight_sql: true
        use_sql_comments: true
        format_sql: true
        default_batch_fetch_size: 100
    hibernate:
      ddl-auto: update
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  servlet:
    multipart:
      max-file-size: 11MB
      max-request-size: 12MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  exp: ${JWT_ACCESS_EXP}

whisper:
  flask-server-url: ${FLASK_HOST}

jasypt:
  encryptor:
    password: ${JASYPT_SECRET}

logging:
  level.org:
    hibernate:
      type:
        descriptor:
          sql:
            BasicBinder: trace


kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}
  redirect-url: ${KAKAO_REDIRECT_URL}
  android-redirect-url: ${KAKAO_ANDROID_REDIRECT_URL}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-frontend-callback-url: ${KAKAO_FRONTEND_CALLBACK_URL}
  app-scheme-callback-url: ${KAKAO_APP_SCHEME_CALLBACK_URL}
  dev:
    redirect-url: ${KAKAO_DEV_REDIRECT_URL}
    android-redirect-url: ${KAKAO_DEV_ANDROID_REDIRECT_URL}
    redirect-frontend-callback-url: ${KAKAO_DEV_FRONTEND_CALLBACK_URL}

springdoc:
  api-docs:
    path: /api/api-spec
    enabled: true
  swagger-ui:
    path: /api/my-docs
    enabled: true
  override-with-generic-response: false
  use-fqn: true