<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            line-height: 1.6;
        }

        .error-container {
            border: 1px solid #ddd;
            display: inline-block;
            padding: 20px;
            border-radius: 8px;
        }

        .error-code {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="error-container">
    <h1>⚠️ 서비스 이용 안내</h1>
    <p>현재 요청을 처리하는 중 문제가 발생했습니다.</p>

    <p th:if="${errorMessage}" class="error-code">
        <span th:text="${errorMessage}">에러 메시지</span>
    </p>
</div>
</body>
</html>
